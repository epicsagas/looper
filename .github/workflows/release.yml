name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}

permissions:
  contents: write

jobs:
  prepare-go-release:
    runs-on: ubuntu-latest

    outputs:
      release-version: ${{ steps.release-version.outputs.value }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            printf 'These files need gofmt:\n%s\n' "$unformatted"
            exit 1
          fi

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        env:
          LOOPER_BUILD_GIT_SHA: ${{ github.sha }}
        run: |
          export LOOPER_BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags "$(go run ./tools/go-build-flags)" ./...

      - name: Read Go release version
        id: release-version
        run: |
          release_version="$(go run ./cmd/looper --version)"
          echo "value=${release_version}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches Go release version
        env:
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.release-version.outputs.value }}
        run: |
          expected_tag="v${RELEASE_VERSION}"
          if [ "$TAG_NAME" != "$expected_tag" ]; then
            echo "Release tag ${TAG_NAME} does not match Go release version ${RELEASE_VERSION}." >&2
            exit 1
          fi

  create-draft-release:
    needs: prepare-go-release
    runs-on: ubuntu-latest

    steps:
      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Looper ${{ github.ref_name }}
          draft: true
          generate_release_notes: true

  build-looper:
    needs:
      - prepare-go-release
      - create-draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            artifact-name: looper-darwin-arm64
          - target: darwin-x64
            runner: macos-13
            goos: darwin
            goarch: amd64
            artifact-name: looper-darwin-x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build looper for ${{ matrix.target }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          LOOPER_BUILD_GIT_SHA: ${{ github.sha }}
        run: |
          export LOOPER_BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist/release
          go build -trimpath -ldflags "$(go run ./tools/go-build-flags)" -o "dist/release/${{ matrix.artifact-name }}" ./cmd/looper

      - name: Verify built binary exists
        run: test -f "dist/release/${{ matrix.artifact-name }}"

      - name: Generate and verify SHA-256 checksum
        working-directory: dist/release
        run: |
          shasum -a 256 "${{ matrix.artifact-name }}" > "${{ matrix.artifact-name }}.sha256"
          shasum -a 256 -c "${{ matrix.artifact-name }}.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: looper-release-assets-${{ matrix.target }}
          path: |
            dist/release/${{ matrix.artifact-name }}
            dist/release/${{ matrix.artifact-name }}.sha256

  build-looperd:
    needs:
      - prepare-go-release
      - create-draft-release
    strategy:
      fail-fast: false
      matrix:
        include:
          # Phase 1 intentionally publishes macOS artifacts only.
          - target: darwin-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            artifact-name: looperd-darwin-arm64
          - target: darwin-x64
            runner: macos-13
            goos: darwin
            goarch: amd64
            artifact-name: looperd-darwin-x64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build looperd for ${{ matrix.target }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          LOOPER_BUILD_GIT_SHA: ${{ github.sha }}
        run: |
          export LOOPER_BUILD_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist/release
          go build -trimpath -ldflags "$(go run ./tools/go-build-flags)" -o "dist/release/${{ matrix.artifact-name }}" ./cmd/looperd

      - name: Verify built binary version
        env:
          EXPECTED_VERSION: ${{ needs.prepare-go-release.outputs.release-version }}
        run: |
          artifact_path="dist/release/${{ matrix.artifact-name }}"
          actual_version=$("$artifact_path" --version)
          if [ "$actual_version" != "$EXPECTED_VERSION" ]; then
            echo "Expected $artifact_path --version to print ${EXPECTED_VERSION}, got ${actual_version}." >&2
            exit 1
          fi

      - name: Generate and verify SHA-256 checksum
        working-directory: dist/release
        run: |
          shasum -a 256 "${{ matrix.artifact-name }}" > "${{ matrix.artifact-name }}.sha256"
          shasum -a 256 -c "${{ matrix.artifact-name }}.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: looperd-release-assets-${{ matrix.target }}
          path: |
            dist/release/${{ matrix.artifact-name }}
            dist/release/${{ matrix.artifact-name }}.sha256

  publish-release:
    needs:
      - prepare-go-release
      - build-looper
      - build-looperd
    runs-on: ubuntu-latest

    steps:
      - name: Download compiled artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-release-assets-*"
          merge-multiple: true
          path: release-assets

      - name: Verify predictable asset names
        run: |
          test -f release-assets/looper-darwin-arm64
          test -f release-assets/looper-darwin-arm64.sha256
          test -f release-assets/looper-darwin-x64
          test -f release-assets/looper-darwin-x64.sha256
          test -f release-assets/looperd-darwin-arm64
          test -f release-assets/looperd-darwin-arm64.sha256
          test -f release-assets/looperd-darwin-x64
          test -f release-assets/looperd-darwin-x64.sha256

      - name: Verify Linux artifacts are not published in Phase 1
        run: |
          if find release-assets -maxdepth 1 \( -name '*linux*' -o -name '*.AppImage' \) | grep -q .; then
            echo "Phase 1 release workflow must not publish Linux artifacts." >&2
            exit 1
          fi

      - name: Publish GitHub release with assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Looper ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            release-assets/looper-darwin-arm64
            release-assets/looper-darwin-arm64.sha256
            release-assets/looper-darwin-x64
            release-assets/looper-darwin-x64.sha256
            release-assets/looperd-darwin-arm64
            release-assets/looperd-darwin-arm64.sha256
            release-assets/looperd-darwin-x64
            release-assets/looperd-darwin-x64.sha256
